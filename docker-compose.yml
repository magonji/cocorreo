services:
  backend:
    build: .
    restart: unless-stopped
    volumes:
      # Directorio de datos ya importado (BD cifrada + adjuntos). Cópialo/rsync-éalo
      # al servidor y apunta aquí; por defecto usa ./data junto a este archivo.
      - ${COCORREO_DATA_DIR:-./data}:/data
      # Archivo de texto plano con la passphrase, permisos 600, montado solo lectura.
      - ${COCORREO_PASSPHRASE_FILE:-./secrets/passphrase.txt}:/run/secrets/cocorreo_passphrase:ro
    command:
      - serve
      - --data-dir
      - /data
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --passphrase-file
      - /run/secrets/cocorreo_passphrase
    networks:
      - internal

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${COCORREO_WEB_PORT:-8443}:80"
    networks:
      - internal

networks:
  internal:
