services:
  backend:
    # `image` is used by `docker compose pull` (prebuilt multi-arch image from
    # GitHub Actions/GHCR); `build` is kept so `docker compose build` still
    # works for local development without needing CI.
    image: ${GHCR_NAMESPACE:-ghcr.io/yourusername}/cocorreo-backend:latest
    build: .
    restart: unless-stopped
    volumes:
      # Already-imported data directory (encrypted DB + attachments). Copy/rsync it
      # to the server and point this here; defaults to ./data next to this file.
      - ${COCORREO_DATA_DIR:-./data}:/data
      # Plain-text file with the passphrase, mode 600, mounted read-only.
      - ${COCORREO_PASSPHRASE_FILE:-./secrets/passphrase.txt}:/run/secrets/cocorreo_passphrase:ro
    command:
      - serve
      - --data-dir
      - /data
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --passphrase-file
      - /run/secrets/cocorreo_passphrase
    networks:
      - internal

  web:
    image: ${GHCR_NAMESPACE:-ghcr.io/yourusername}/cocorreo-web:latest
    build: ./web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${COCORREO_WEB_PORT:-8443}:80"
    networks:
      - internal

networks:
  internal:
